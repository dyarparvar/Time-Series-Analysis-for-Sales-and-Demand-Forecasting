xgboost:
  weekly_data:
    data:
      train_start: '2012-01-01'
      forecast_horizon: 32
      model:
        alchemist: additive
        caterpillar: multiplicative
    regressor:
      n_estimators: 200
      learning_rate: 0.05
      booster: gbtree
      tree_method: exact
      objective: reg:squarederror
      max_depth: 5
      min_child_weight: 3
      gamma: 0.1
      reg_alpha: 0
      reg_lambda: 1
      subsample: 0.8
      validate_parameters: 1
      random_state: 42
      n_jobs: -1
      base_score: 0.5
    predictor:
      sp: 52
      degree:
        alchemist: 1
        caterpillar: 2
      window_length:
        alchemist: 52
        caterpillar: 104
      model:
        alchemist: additive
        caterpillar: multiplicative
      strategy: recursive
    grid_search:
      initial_window: 0.8
      strategy: refit
      n_jobs: -1
      backend: threading
      error_score: raise
      verbose: 1
      scoring: !!python/object:sktime.performance_metrics.forecasting._mae.MeanAbsoluteError
        multioutput: uniform_average
        multilevel: uniform_average
        by_index: false
        name: MeanAbsoluteError
        _tags_dynamic: {}
        _config_dynamic: {}
      param_grid:
        alchemist:
          forecast__window_length:
          - 52
          - 78
          - 104
        caterpillar:
          forecast__window_length:
          - 52
          - 78
          - 104
          - 130
  monthly_data:
    data:
      train_start: '2012-01-01'
      forecast_horizon: 8
      model:
        alchemist: additive
        caterpillar: multiplicative
    regressor:
      n_estimators: 200
      learning_rate: 0.05
      booster: gbtree
