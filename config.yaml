      objective: reg:squarederror
      max_depth: 5
      min_child_weight: 3
      gamma: 0.1
      reg_alpha: 0
      reg_lambda: 1
      subsample: 0.9
      validate_parameters: 1
      random_state: 42
      n_jobs: -1
      base_score: 0.5
    predictor:
      sp: 12
      degree:
        alchemist: 1
        caterpillar: 2
      window_length:
        alchemist: 12
        caterpillar: 24
      model:
        alchemist: additive
