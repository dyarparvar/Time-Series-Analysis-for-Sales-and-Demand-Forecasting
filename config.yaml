lstm_config:
  train_start: '2012-01-01'
  lookback: 104
  forecast_horizon: 32
  validation_split: 0.2
  hidden_activation: tanh
  output_activation: linear
  dropout_rate: 0.2
  loss: mse
  metrics:
  - mae
  epochs: 100
  batch_size: 32
  early_stoppying_monitor: val_loss
  patience: 10
  checkpoint_monitor:
    loss:
    - val_loss
    - min
    mae:
    - mae
    - min
  param_grid:
    n_neuron_indx:
    - 0
    - 1
    - 2
    n_neuron:
    - - 32
      - 16
    - - 64
      - 32
    - - 128
      - 64
      - 32
    optimizer:
    - adam
    - rmsprop
    learning_rate:
    - 0.0005
    - 0.001
  tuner_objective: val_loss
